<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150">
  <!-- SILOS COMPANY Logo - Blue building with silos -->
  <defs>
    <linearGradient id="buildingGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5BBA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main building structure -->
  <rect x="50" y="40" width="80" height="60" fill="url(#buildingGradient)" rx="5"/>
  
  <!-- Silos -->
  <rect x="140" y="20" width="20" height="80" fill="#3498DB" rx="10"/>
  <rect x="170" y="30" width="20" height="70" fill="#5DADE2" rx="10"/>
  <rect x="200" y="25" width="20" height="75" fill="#2E86AB" rx="10"/>
  
  <!-- Yellow accent line -->
  <rect x="40" y="110" width="190" height="8" fill="#F39C12" rx="4"/>
  
  <!-- Arabic text -->
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="14" fill="#2C3E50" text-anchor="start">الشركة العامة الأردنية للصوامع والتموين</text>
  
  <!-- English text -->
  <text x="250" y="75" font-family="Arial, sans-serif" font-size="12" fill="#7F8C8D" text-anchor="start">Jordan Silos &amp; Supply General Company</text>
</svg>
